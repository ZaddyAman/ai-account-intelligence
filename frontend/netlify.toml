# Netlify Configuration for AI Account Intelligence Frontend

[build]
  command = "npm run build"
  publish = "dist"

# Redirect all API calls to Railway backend
# Replace 'your-backend-app' with your actual Railway app name after deployment
[[redirects]]
  from = "/api/*"
  to = "https://your-railway-app.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
