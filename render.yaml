# Render.com Configuration
# Use Docker for reliable deployment

services:
  - name: ai-account-intelligence
    type: docker
    region: oregon
    dockerfilePath: Dockerfile
    dockerCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KILO_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
    plan: free
